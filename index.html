<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanal El Takibi</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    .input_video { display: none; }
    
    /* Canvas'ı container'a tam oturtur, flip burada */
    .output_canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    #loadingText {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-size: 20px;
      text-align: center;
      background: rgba(0,0,0,0.7);
      padding: 16px 24px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div id="loadingText">📷 Kamera açılıyor ve model yükleniyor...<br><small>Kamera iznini onaylamayı unutma</small></div>

  <div class="container">
    <video class="input_video" autoplay playsinline></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingText = document.getElementById('loadingText');

    let canvasSized = false;

    function onResults(results) {
      loadingText.style.display = 'none';

      // Boyutu sadece bir kez ayarla
      if (!canvasSized && videoElement.videoWidth > 0) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasSized = true;
      }

      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // Arka planı ister açık bırak (siyah kalır), ister kamerayı yansıt:
      // canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
            { color: '#00FF00', lineWidth: 4 });
          drawLandmarks(canvasCtx, landmarks,
            { color: '#FF0000', lineWidth: 2, radius: 4 });
        }
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    // Ön kamera için doğru yöntem
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720, facingMode: 'user' }
        });
        videoElement.srcObject = stream;
        videoElement.onloadedmetadata = () => {
          videoElement.play();
          // MediaPipe loop
          const camera = new Camera(videoElement, {
            onFrame: async () => {
              await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
          });
          camera.start();
        };
      } catch (err) {
        loadingText.textContent = '❌ Kamera erişimi reddedildi: ' + err.message;
      }
    }

    startCamera();
  </script>

</body>
</html>
