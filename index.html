<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Silah Fırlat</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;overflow:hidden;font-family:Arial,sans-serif;color:#fff;height:100vh;width:100vw;}
#gameCanvas{position:fixed;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);}
.input_video{display:none;}
#loading{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;}
#loading h1{font-size:26px;letter-spacing:3px;}
#loading p{opacity:.5;font-size:13px;text-align:center;padding:0 20px;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;}
#score-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 18px;text-align:center;backdrop-filter:blur(10px);}
#score-box .label{font-size:10px;letter-spacing:2px;opacity:.6;text-transform:uppercase;}
#score-box .value{font-size:28px;font-weight:700;}
#state-box{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 14px;font-size:12px;opacity:.8;text-align:right;}
#weapon-select{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:20;}
.wpn-btn{background:rgba(0,0,0,.65);border:2px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 18px;cursor:pointer;font-size:19px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#fff;pointer-events:all;transition:all .2s;}
.wpn-btn span{font-size:10px;letter-spacing:1px;opacity:.7;}
.wpn-btn.active{border-color:#fff;background:rgba(255,255,255,.15);}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <h1>⚡ 3D SİLAH FIRLAT</h1>
  <p>Yükleniyor...<br><br>✊ Yumruk → aç = Fırlat<br>✋ El aç = Geri çağır</p>
</div>
<canvas id="gameCanvas"></canvas>
<video class="input_video" autoplay playsinline></video>
<div id="ui">
  <div id="score-box"><div class="label">Skor</div><div class="value" id="scoreVal">0</div></div>
  <div id="state-box" id="stateBox">—</div>
</div>
<div id="weapon-select">
  <button class="wpn-btn active" id="btnMjolnir" onclick="selectWeapon('mjolnir')">⚡<span>MJOLNİR</span></button>
  <button class="wpn-btn" id="btnLeviathan" onclick="selectWeapon('leviathan')">🪓<span>LEVİATHAN</span></button>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const video=document.querySelector('.input_video');
const loading=document.getElementById('loading');
const scoreEl=document.getElementById('scoreVal');
const stateBox=document.getElementById('state-box');

let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let score=0;
let selectedWeapon='mjolnir';
let handLandmarks=null;

function selectWeapon(w){
  selectedWeapon=w;
  document.getElementById('btnMjolnir').classList.toggle('active',w==='mjolnir');
  document.getElementById('btnLeviathan').classList.toggle('active',w==='leviathan');
  resetWeapon();
}

// ============================================================
// PROJEKSİYON
// ============================================================
const CAM_Z=-500;
const FOV=650;
function project(x3,y3,z3){
  const dz=z3-CAM_Z;
  if(dz<=10)return{x:W/2,y:H*.5,scale:0.001,visible:false};
  const scale=FOV/dz;
  return{x:W/2+x3*scale, y:H*.52+y3*scale, scale, visible:true};
}
// Ekran → 3D (belirli z'de)
function unproject(sx,sy,z3){
  const dz=z3-CAM_Z;
  const scale=FOV/dz;
  return{x:(sx-W/2)/scale, y:(sy-H*.52)/scale, z:z3};
}

// ============================================================
// SİLAH STATE
// ============================================================
// States: 'resting' | 'throwing' | 'stuck' | 'returning' | 'hand'
// 'resting'   → sahnede duruyor (kütük yanında veya yerde)
// 'throwing'  → fırlatıldı, uçuyor
// 'stuck'     → bir nesneye saplandı
// 'returning' → Bezier ile ele dönüyor
// 'hand'      → elde, fırlatmaya hazır

const weapon={
  x3:120, y3:110, z3:180,  // Başlangıç: sahne içinde kütük yanında
  vx3:0, vy3:0, vz3:0,
  rotX:0.3, rotY:0, rotZ:Math.PI*.15,
  rotVX:0, rotVY:0, rotVZ:0,
  state:'resting',
  trail3:[],
  returnPath3:[], returnT:0,
  handX:W/2, handY:H*.7,
  // Fırlatma için yumruk takibi
  _fistFrames:0,
  _prevOpen:false,
  // Geri çağırma için açık el takibi
  _openFrames:0,
  // Sahnede bekleme sallanma
  _bobT:0,
};

function resetWeapon(){
  weapon.x3=120;weapon.y3=110;weapon.z3=180;
  weapon.vx3=0;weapon.vy3=0;weapon.vz3=0;
  weapon.rotX=0.3;weapon.rotY=0;weapon.rotZ=Math.PI*.15;
  weapon.rotVX=0;weapon.rotVY=0;weapon.rotVZ=0;
  weapon.state='resting';
  weapon.trail3=[];weapon.returnPath3=[];weapon.returnT=0;
  weapon._fistFrames=0;weapon._prevOpen=false;weapon._openFrames=0;weapon._bobT=0;
}

// ============================================================
// HEDEFLER
// ============================================================
let objects=[];
function createObj(idx){
  const configs=[
    {type:'log',   x3:-280, y3:90,  z3:220, r:38},
    {type:'log',   x3:-80,  y3:85,  z3:310, r:36},
    {type:'shield',x3:60,   y3:70,  z3:260, r:32},
    {type:'rock',  x3:210,  y3:95,  z3:200, r:34},
    {type:'barrel',x3:330,  y3:80,  z3:280, r:30},
    {type:'log',   x3:-180, y3:88,  z3:350, r:36},
  ];
  const c=configs[idx]||configs[0];
  return{...c, broken:false, shards:[], respawnTimer:0, flash:0, stuckWeapon:null, stuckAngle:0, stuckOffY:0};
}
function initObjects(){objects=[];for(let i=0;i<6;i++)objects.push(createObj(i));}
initObjects();

// ============================================================
// PARÇACIKLAR
// ============================================================
let particles=[];
function spawnParticles(x3,y3,z3,color,count=18){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,b=(Math.random()-.5)*Math.PI,spd=30+Math.random()*70;
    particles.push({x:x3,y:y3,z:z3,
      vx:Math.cos(a)*Math.cos(b)*spd,vy:Math.sin(b)*spd-25,vz:Math.sin(a)*Math.cos(b)*spd,
      life:1,decay:.018+Math.random()*.02,r:3+Math.random()*6,color});
  }
}
let screenFlash=0,flashColor='rgba(255,220,50,';

// ============================================================
// EL YARDIMCI
// ============================================================
function lm(l){return{x:l.x*W,y:l.y*H};}
function handCenter(lms){const p0=lm(lms[0]),p9=lm(lms[9]);return{x:(p0.x+p9.x)/2,y:(p0.y+p9.y)/2};}
function getHandOpenness(lms){
  // 0=tam yumruk, 1=tam açık
  const wrist=lm(lms[0]);
  let sum=0;
  const tips=[8,12,16,20],bases=[5,9,13,17];
  for(let i=0;i<4;i++){
    const tip=lm(lms[tips[i]]),base=lm(lms[bases[i]]);
    const tipD=Math.hypot(tip.x-wrist.x,tip.y-wrist.y);
    const baseD=Math.hypot(base.x-wrist.x,base.y-wrist.y);
    sum+=tipD/(baseD+1);
  }
  return Math.min(sum/4/1.5,1);
}

// ============================================================
// BEZIER 3D
// ============================================================
function bez3(p0,p1,p2,p3,t){
  const m=1-t;
  return{
    x:m*m*m*p0.x+3*m*m*t*p1.x+3*m*t*t*p2.x+t*t*t*p3.x,
    y:m*m*m*p0.y+3*m*m*t*p1.y+3*m*t*t*p2.y+t*t*t*p3.y,
    z:m*m*m*p0.z+3*m*m*t*p1.z+3*m*t*t*p2.z+t*t*t*p3.z,
  };
}

// ============================================================
// FIRL AT
// ============================================================
function throwWeapon(){
  if(weapon.state!=='hand')return;
  // Hedefe doğru fırlat — sahnedeki nesnelerin ortasına
  weapon.vx3=(Math.random()-.5)*60;
  weapon.vy3=-15;
  weapon.vz3=220+Math.random()*80;
  weapon.state='throwing';
  weapon.trail3=[];
  weapon.rotVX=(.1+Math.random()*.15)*(Math.random()>.5?1:-1);
  weapon.rotVY=.25+Math.random()*.2;
  weapon.rotVZ=(.04+Math.random()*.06)*(Math.random()>.5?1:-1);
}

// ============================================================
// GERİ ÇAĞIR
// ============================================================
function recallWeapon(){
  if(weapon.state==='hand'||weapon.state==='returning')return;
  weapon.state='returning';weapon.returnT=0;
  const hw=unproject(weapon.handX,weapon.handY,-200);
  const p0={x:weapon.x3,y:weapon.y3,z:weapon.z3};
  const p3={x:hw.x,y:hw.y,z:-200};
  const side=(Math.random()>.5?1:-1);
  const midZ=(p0.z+p3.z)/2;
  const p1={x:p0.x+side*250,y:Math.min(p0.y,p3.y)-180,z:midZ+80};
  const p2={x:p3.x-side*180,y:Math.min(p0.y,p3.y)-120,z:midZ-40};
  weapon.returnPath3=[];
  for(let i=0;i<=80;i++) weapon.returnPath3.push(bez3(p0,p1,p2,p3,i/80));
  weapon.trail3=[];
  weapon.rotVY=.3+Math.random()*.2;
  weapon.rotVX=.08+Math.random()*.1;
}

// ============================================================
// KIRMA / SAPLAMA
// ============================================================
function hitObject(obj){
  if(obj.broken||obj.stuckWeapon)return;
  const isLog=obj.type==='log';
  if(isLog&&selectedWeapon==='leviathan'){
    obj.stuckWeapon=selectedWeapon;
    obj.stuckAngle=weapon.rotZ;
    obj.stuckOffY=-obj.r*.6;
    obj.flash=1;
    spawnParticles(obj.x3,obj.y3,obj.z3,'rgba(120,220,255,',14);
    weapon.state='stuck';
    weapon.x3=obj.x3;weapon.y3=obj.y3+obj.stuckOffY;weapon.z3=obj.z3;
    screenFlash=8;flashColor='rgba(80,200,255,';
    score+=15;scoreEl.textContent=score;
    setTimeout(()=>{obj.stuckWeapon=null;recallWeapon();},2000);
  } else {
    obj.broken=true;
    for(let i=0;i<18;i++){
      const a=Math.random()*Math.PI*2,b=(Math.random()-.5)*Math.PI,spd=25+Math.random()*55;
      obj.shards.push({x:obj.x3,y:obj.y3,z:obj.z3,
        vx:Math.cos(a)*Math.cos(b)*spd,vy:Math.sin(b)*spd-35,vz:Math.sin(a)*Math.cos(b)*spd,
        rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.3,r:5+Math.random()*11,life:1});
    }
    const col=selectedWeapon==='mjolnir'?'rgba(255,220,50,':'rgba(80,200,255,';
    spawnParticles(obj.x3,obj.y3,obj.z3,col,24);
    screenFlash=12;flashColor=selectedWeapon==='mjolnir'?'rgba(255,220,50,':'rgba(80,200,255,';
    score+=10;scoreEl.textContent=score;
    obj.respawnTimer=210;
    setTimeout(()=>recallWeapon(),300);
    weapon.state='returning';
  }
}

// ============================================================
// ÇİZİM - SHAPES
// ============================================================
function drawMjolnirShape(){
  const t=Date.now()/160;
  // Elektrik topları
  for(let i=0;i<5;i++){
    const a=t+i*Math.PI*2/5;
    ctx.beginPath();ctx.arc(Math.cos(a)*24,Math.sin(a)*16,2+Math.sin(t*5+i)*1.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,180,255,${.55+Math.sin(t*3+i)*.3})`;ctx.fill();
    if(i%2===0){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*14,Math.sin(a)*9);ctx.strokeStyle='rgba(160,210,255,.25)';ctx.lineWidth=1;ctx.stroke();}
  }
  // Sap
  ctx.beginPath();ctx.roundRect(-5,12,10,38,[3]);
  const sg=ctx.createLinearGradient(-5,12,5,12);sg.addColorStop(0,'#3a2010');sg.addColorStop(.5,'#8a6035');sg.addColorStop(1,'#3a2010');
  ctx.fillStyle=sg;ctx.fill();ctx.strokeStyle='#1a0a04';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<4;i++){ctx.beginPath();ctx.rect(-6,15+i*8,12,5);ctx.fillStyle='rgba(160,110,50,.85)';ctx.fill();}
  // Baş
  const hg=ctx.createLinearGradient(-25,-22,25,22);
  hg.addColorStop(0,'#4a4a4a');hg.addColorStop(.25,'#d8d8d8');hg.addColorStop(.55,'#909090');hg.addColorStop(1,'#303030');
  ctx.beginPath();ctx.roundRect(-25,-22,50,32,[5]);ctx.fillStyle=hg;ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='rgba(80,170,255,.9)';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('ᚦ',0,-5);
  const glow=ctx.createRadialGradient(0,0,0,0,0,38);glow.addColorStop(0,'rgba(80,160,255,.3)');glow.addColorStop(1,'rgba(80,160,255,0)');
  ctx.beginPath();ctx.arc(0,0,38,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
}

function drawLeviathanShape(){
  const t=Date.now()/250;
  for(let i=0;i<7;i++){
    const a=t*.5+i*Math.PI*2/7;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*24,Math.sin(a)*24);ctx.lineTo(Math.cos(a)*33,Math.sin(a)*33);
    ctx.strokeStyle=`rgba(120,230,255,${.25+Math.sin(t*2+i)*.15})`;ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.beginPath();ctx.roundRect(-5,10,10,46,[3]);
  const sapG=ctx.createLinearGradient(-5,10,5,10);sapG.addColorStop(0,'#152535');sapG.addColorStop(.5,'#254565');sapG.addColorStop(1,'#152535');
  ctx.fillStyle=sapG;ctx.fill();ctx.strokeStyle='#091520';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<3;i++){ctx.beginPath();ctx.rect(-6,14+i*12,12,7);ctx.fillStyle='rgba(80,160,200,.7)';ctx.fill();}
  ctx.beginPath();
  ctx.moveTo(-6,-10);ctx.bezierCurveTo(-6,-32,20,-42,36,-26);ctx.bezierCurveTo(45,-14,45,16,36,26);ctx.bezierCurveTo(20,40,-6,30,-6,10);ctx.lineTo(-20,0);ctx.closePath();
  const axG=ctx.createLinearGradient(-20,-42,45,40);axG.addColorStop(0,'#0e2840');axG.addColorStop(.3,'#1e6090');axG.addColorStop(.55,'#40b0e0');axG.addColorStop(1,'#0e2030');
  ctx.fillStyle=axG;ctx.fill();ctx.strokeStyle='#081828';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle='rgba(180,240,255,.35)';ctx.lineWidth=1;
  [[0,0,22,-16],[0,0,24,12],[12,-8,12,14],[4,-4,32,-12]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.beginPath();ctx.bezierCurveTo(45,-14,45,16,36,26);ctx.strokeStyle='rgba(200,245,255,.85)';ctx.lineWidth=2.5;ctx.stroke();
  const ig=ctx.createRadialGradient(14,-4,0,14,-4,44);ig.addColorStop(0,'rgba(80,200,255,.2)');ig.addColorStop(1,'rgba(80,200,255,0)');
  ctx.beginPath();ctx.arc(14,-4,44,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();
}

function drawWeapon3D(x3,y3,z3,rotX,rotY,rotZ,alpha=1){
  const proj=project(x3,y3,z3);
  if(!proj.visible||proj.scale<0.005)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(proj.x,proj.y);
  ctx.rotate(rotZ);ctx.scale(Math.cos(rotY)*proj.scale*75, Math.cos(rotX)*proj.scale*75);
  if(selectedWeapon==='mjolnir')drawMjolnirShape();else drawLeviathanShape();
  ctx.restore();
}

// ============================================================
// NESNELER ÇİZİMİ
// ============================================================
function drawLog(proj,obj){
  const s=proj.scale*75;
  ctx.save();ctx.translate(proj.x,proj.y);
  if(obj.flash>0){ctx.shadowColor='rgba(255,160,50,.9)';ctx.shadowBlur=22*obj.flash;}
  // Kütük gövdesi
  ctx.beginPath();ctx.ellipse(0,0,s*.5,s*1.05,0,0,Math.PI*2);
  const lg=ctx.createRadialGradient(-s*.15,-s*.15,0,0,0,s*1.1);
  lg.addColorStop(0,'#6a3015');lg.addColorStop(.5,'#4a2010');lg.addColorStop(1,'#1e0c04');
  ctx.fillStyle=lg;ctx.fill();ctx.strokeStyle='#150804';ctx.lineWidth=1.5*proj.scale;ctx.stroke();
  // Yıllık halkalar
  for(let r=.18;r<.92;r+=.22){
    ctx.beginPath();ctx.ellipse(0,0,s*.5*r,s*.32*r,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(110,55,20,.4)`;ctx.lineWidth=proj.scale;ctx.stroke();
  }
  // Çatlak çizgi
  ctx.beginPath();ctx.moveTo(-s*.08,-s*.55);ctx.quadraticCurveTo(s*.1,0,s*.05,s*.6);
  ctx.strokeStyle='rgba(15,5,2,.7)';ctx.lineWidth=2*proj.scale;ctx.stroke();
  // Saplanmış silah
  if(obj.stuckWeapon){
    ctx.save();ctx.translate(0,-s*.45);ctx.rotate(obj.stuckAngle+Math.PI*.5);
    ctx.scale(proj.scale*60,proj.scale*60);drawLeviathanShape();ctx.restore();
    // Buz parıltısı
    const ig=ctx.createRadialGradient(0,-s*.45,0,0,-s*.45,s*.5);
    ig.addColorStop(0,'rgba(80,200,255,.2)');ig.addColorStop(1,'rgba(80,200,255,0)');
    ctx.beginPath();ctx.arc(0,-s*.45,s*.5,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();
  }
  ctx.restore();
}
function drawShield3D(proj,obj){
  const s=proj.scale*75;ctx.save();ctx.translate(proj.x,proj.y);
  if(obj.flash>0){ctx.shadowColor='rgba(255,220,50,.9)';ctx.shadowBlur=20*obj.flash;}
  ctx.beginPath();ctx.moveTo(0,-s*.85);ctx.lineTo(s*.72,-s*.42);ctx.lineTo(s*.72,s*.22);ctx.lineTo(0,s*.8);ctx.lineTo(-s*.72,s*.22);ctx.lineTo(-s*.72,-s*.42);ctx.closePath();
  const sg=ctx.createRadialGradient(-s*.18,-s*.18,0,0,0,s*.85);sg.addColorStop(0,'#7090b8');sg.addColorStop(1,'#1a3858');
  ctx.fillStyle=sg;ctx.fill();ctx.strokeStyle='#90b8d8';ctx.lineWidth=2*proj.scale;ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*.6);ctx.lineTo(0,s*.6);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2*proj.scale;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*.5,0);ctx.lineTo(s*.5,0);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.5*proj.scale;ctx.stroke();
  ctx.restore();
}
function drawRock3D(proj,obj){
  const s=proj.scale*75;ctx.save();ctx.translate(proj.x,proj.y);
  if(obj.flash>0){ctx.shadowColor='rgba(255,220,50,.9)';ctx.shadowBlur=20*obj.flash;}
  ctx.beginPath();
  const pts=[];for(let i=0;i<9;i++){const a=i/9*Math.PI*2,r=s*(.65+Math.sin(i*2.3+1)*.3);pts.push([Math.cos(a)*r,Math.sin(a)*r]);}
  ctx.moveTo(pts[0][0],pts[0][1]);for(const p of pts)ctx.lineTo(p[0],p[1]);ctx.closePath();
  const rg=ctx.createRadialGradient(-s*.2,-s*.2,0,0,0,s);rg.addColorStop(0,'#909090');rg.addColorStop(.6,'#505050');rg.addColorStop(1,'#252525');
  ctx.fillStyle=rg;ctx.fill();ctx.strokeStyle='#181818';ctx.lineWidth=2*proj.scale;ctx.stroke();
  ctx.restore();
}
function drawBarrel3D(proj,obj){
  const s=proj.scale*75;ctx.save();ctx.translate(proj.x,proj.y);
  if(obj.flash>0){ctx.shadowColor='rgba(255,220,50,.9)';ctx.shadowBlur=20*obj.flash;}
  const bg=ctx.createLinearGradient(-s*.5,-s*.75,s*.5,s*.75);
  bg.addColorStop(0,'#5a3010');bg.addColorStop(.4,'#c07030');bg.addColorStop(.7,'#8a5020');bg.addColorStop(1,'#3a1a08');
  ctx.beginPath();ctx.roundRect(-s*.5,-s*.75,s,s*1.5,[s*.28]);ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#2a1005';ctx.lineWidth=2*proj.scale;ctx.stroke();

function drawObjectAt(obj){
  if(obj.broken){
    for(const s of obj.shards){
      const p=project(s.x,s.y,s.z);if(!p.visible)continue;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(s.rot);ctx.globalAlpha=s.life;
      ctx.beginPath();ctx.arc(0,0,s.r*p.scale*50,0,Math.PI*2);
      ctx.fillStyle='rgba(140,110,80,.85)';ctx.fill();ctx.strokeStyle='rgba(200,170,130,.5)';ctx.lineWidth=p.scale*25;ctx.stroke();
      ctx.restore();
    }
    return;
  }
  const proj=project(obj.x3,obj.y3,obj.z3);
  if(!proj.visible)return;
  if(obj.type==='log')drawLog(proj,obj);
  else if(obj.type==='shield')drawShield3D(proj,obj);
  else if(obj.type==='rock')drawRock3D(proj,obj);
  else if(obj.type==='barrel')drawBarrel3D(proj,obj);
}
