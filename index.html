<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal Top</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; overflow: hidden; font-family: Arial, sans-serif; color: #fff; height: 100vh; width: 100vw; }
#c { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
video { display: none; }
#loading { position: fixed; inset: 0; background: #0a0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99; gap: 14px; text-align: center; padding: 20px; }
#loading h1 { font-size: 22px; letter-spacing: 2px; }
#loading p { font-size: 13px; opacity: .6; line-height: 2; }
.sp { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: #fff; border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
#score { position: fixed; top: 16px; left: 16px; z-index: 10; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 8px 16px; pointer-events: none; }
#score .l { font-size: 10px; letter-spacing: 2px; opacity: .5; text-transform: uppercase; }
#score .v { font-size: 26px; font-weight: 700; }
#hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 8px 18px; font-size: 12px; opacity: .75; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>
<div id="loading">
  <div class="sp"></div>
  <h1>⚙️ METAL TOP</h1>
  <p id="lp">Model yükleniyor...<br><br>✋ El aç → top elde<br>✊ Yumruk yap → aç → fırlat<br>✋ El aç → geri çağır</p>
</div>
<canvas id="c"></canvas>
<video id="v" autoplay playsinline muted></video>
<div id="score"><div class="l">Skor</div><div class="v" id="sc">0</div></div>
<div id="hint">✋ El aç = top gelir &nbsp;|&nbsp; ✊→✋ = Fırlat</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const vid = document.getElementById('v');
const loadDiv = document.getElementById('loading');
const scEl = document.getElementById('sc');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let score = 0;
let handLms = null;

// ─── EL BOYUTU HESAPLA ──────────────────────────────────────
// Elin gerçek ekran boyutunu ölçerek top boyutunu ayarla
function getHandSize(ls) {
  if (!ls) return 60;
  const p0 = { x: ls[0].x * W, y: ls[0].y * H };
  const p9 = { x: ls[9].x * W, y: ls[9].y * H };
  // Bilek → orta parmak tabanı mesafesi = el boyutu referansı
  return Math.hypot(p9.x - p0.x, p9.y - p0.y) * 1.1;
}

function getHandCenter(ls) {
  const p0 = { x: ls[0].x * W, y: ls[0].y * H };
  const p9 = { x: ls[9].x * W, y: ls[9].y * H };
  return { x: (p0.x + p9.x) / 2, y: (p0.y + p9.y) / 2 };
}

function getOpenness(ls) {
  const w = { x: ls[0].x * W, y: ls[0].y * H };
  let s = 0;
  [[8, 5], [12, 9], [16, 13], [20, 17]].forEach(([t, b]) => {
    const tp = { x: ls[t].x * W, y: ls[t].y * H };
    const bs = { x: ls[b].x * W, y: ls[b].y * H };
    s += Math.hypot(tp.x - w.x, tp.y - w.y) / (Math.hypot(bs.x - w.x, bs.y - w.y) + 1);
  });
  return Math.min(s / 4 / 1.4, 1); // 0=yumruk 1=açık
}

// ─── TOP STATE ──────────────────────────────────────────────
const ball = {
  x: W / 2, y: H / 2,
  vx: 0, vy: 0,
  r: 50,          // anlık yarıçap (el büyüklüğüne göre)
  targetR: 50,    // hedef yarıçap (smooth geçiş için)
  state: 'idle',  // idle | hand | fly | returning
  trail: [],
  // Geri dönüş
  returnPath: [], returnT: 0,
  // Hedef el konumu
  handX: 0, handY: 0, handR: 50,
  // Fırlatma takibi
  prevFist: false, fframes: 0, oframes: 0,
  // Önceki el konumu (hız hesabı)
  prevHX: 0, prevHY: 0,
};

// ─── HEDEFLER ───────────────────────────────────────────────
let targets = [];
function mkTarget() {
  return {
    x: 80 + Math.random() * (W - 160),
    y: H * .1 + Math.random() * H * .35,
    r: 28 + Math.random() * 20,
    broken: false,
    shards: [],
    respawn: 0,
    flash: 0,
  };
}
function initTargets() { targets = []; for (let i = 0; i < 6; i++) targets.push(mkTarget()); }
initTargets();

// ─── PARÇACIKLAR ────────────────────────────────────────────
let parts = [];
function spawnParts(x, y, col, n = 16) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 4 + Math.random() * 10;
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3, life: 1, dc: .02 + Math.random() * .025, r: 3 + Math.random() * 6, col });
  }
}
let sflash = 0;

// ─── BEZIER ─────────────────────────────────────────────────
function bz(p0, p1, p2, p3, t) {
  const m = 1 - t;
  return {
    x: m*m*m*p0.x + 3*m*m*t*p1.x + 3*m*t*t*p2.x + t*t*t*p3.x,
    y: m*m*m*p0.y + 3*m*m*t*p1.y + 3*m*t*t*p2.y + t*t*t*p3.y,
  };
}

// ─── FIRLAT ─────────────────────────────────────────────────
function throwBall() {
  if (ball.state !== 'hand') return;
  // Hızı el hareketinden al
  ball.vx = (ball.handX - ball.prevHX) * 1.8;
  ball.vy = (ball.handY - ball.prevHY) * 1.8;
  // Çok yavaşsa yukarı fırlat
  if (Math.hypot(ball.vx, ball.vy) < 8) {
    ball.vx = (Math.random() - .5) * 14;
    ball.vy = -22;
  }
  ball.state = 'fly';
  ball.trail = [];
}

// ─── GERİ ÇAĞIR ─────────────────────────────────────────────
function recallBall() {
  if (ball.state === 'hand' || ball.state === 'returning') return;
  ball.state = 'returning'; ball.returnT = 0;
  const p0 = { x: ball.x, y: ball.y };
  const p3 = { x: ball.handX, y: ball.handY };
  // Bezier kavis
  const side = Math.random() > .5 ? 1 : -1;
  const p1 = { x: p0.x + side * W * .25, y: Math.min(p0.y, p3.y) - H * .2 };
  const p2 = { x: p3.x - side * W * .15, y: Math.min(p0.y, p3.y) - H * .1 };
  ball.returnPath = [];
  for (let i = 0; i <= 60; i++) ball.returnPath.push(bz(p0, p1, p2, p3, i / 60));
  ball.trail = [];
}

// ─── TOP VURDU ──────────────────────────────────────────────
function hitTarget(t) {
  if (t.broken) return;
  t.broken = true; t.shards = [];
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2, sp = 3 + Math.random() * 8;
    t.shards.push({ x: t.x, y: t.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 4, rot: Math.random() * Math.PI * 2, vr: (Math.random() - .5) * .25, r: 4 + Math.random() * 10, life: 1 });
  }
  spawnParts(t.x, t.y, 'rgba(180,200,255,', 20);
  sflash = 10;
  score += 10; scEl.textContent = score;
  t.respawn = 180;
  // Top geri dönsün
  setTimeout(() => recallBall(), 200);
  ball.state = 'idle';
}

// ─── METAL TOP ÇİZ ──────────────────────────────────────────
function drawBall(x, y, r, alpha = 1) {
  if (r < 2) return;
  ctx.save(); ctx.globalAlpha = alpha;

  // Gölge
  ctx.beginPath(); ctx.ellipse(x, y + r * .85, r * .65, r * .18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.filter = 'blur(6px)'; ctx.fill(); ctx.filter = 'none';

  // Metal gradient
  const grad = ctx.createRadialGradient(x - r * .3, y - r * .3, r * .05, x, y, r);
  grad.addColorStop(0, '#e8eef5');
  grad.addColorStop(.25, '#b0bcc8');
  grad.addColorStop(.6, '#6a7a88');
  grad.addColorStop(.85, '#3a4a56');
  grad.addColorStop(1, '#1a2530');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();

  // Kenar çizgisi
  const edgeGrad = ctx.createRadialGradient(x, y, r * .8, x, y, r);
  edgeGrad.addColorStop(0, 'rgba(255,255,255,0)');
  edgeGrad.addColorStop(1, 'rgba(0,0,0,.4)');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = edgeGrad; ctx.fill();

  // Metal çizgi detayları
  ctx.strokeStyle = 'rgba(100,120,140,.5)';
  ctx.lineWidth = r * .04;
  ctx.beginPath(); ctx.arc(x, y, r * .75, Math.PI * .1, Math.PI * .9); ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r * .5, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();

  // Vida/perçin detayları
  const boltPositions = [[-.45, -.45], [.45, -.45], [-.45, .45], [.45, .45]];
  for (const [bx, by] of boltPositions) {
    const boltX = x + bx * r * .6, boltY = y + by * r * .6;
    const boltR = r * .06;
    const bg2 = ctx.createRadialGradient(boltX - boltR * .3, boltY - boltR * .3, 0, boltX, boltY, boltR);
    bg2.addColorStop(0, '#d0d8e0'); bg2.addColorStop(1, '#404858');
    ctx.beginPath(); ctx.arc(boltX, boltY, boltR, 0, Math.PI * 2);
    ctx.fillStyle = bg2; ctx.fill();
  }

  // Parlama (yansıma)
  const shine = ctx.createRadialGradient(x - r * .32, y - r * .32, 0, x - r * .32, y - r * .32, r * .38);
  shine.addColorStop(0, 'rgba(255,255,255,.55)');
  shine.addColorStop(.5, 'rgba(255,255,255,.15)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(x - r * .32, y - r * .32, r * .38, 0, Math.PI * 2);
  ctx.fillStyle = shine; ctx.fill();

  // İkinci küçük parlama
  ctx.beginPath(); ctx.ellipse(x + r * .2, y + r * .25, r * .08, r * .05, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.fill();

  ctx.restore();
}

// ─── TRAIL ──────────────────────────────────────────────────
function drawTrail() {
  if (ball.trail.length < 2) return;
  for (let i = 1; i < ball.trail.length; i++) {
    const pg = i / ball.trail.length;
    const t0 = ball.trail[i-1], t1 = ball.trail[i];
    ctx.beginPath(); ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y);
    ctx.strokeStyle = `rgba(150,180,220,${pg * .5})`;
    ctx.lineWidth = pg * ball.r * .4; ctx.lineCap = 'round'; ctx.stroke();
  }
}

// ─── DÖNÜŞ YOLU ─────────────────────────────────────────────
function drawReturnPath() {
  if (ball.state !== 'returning' || ball.returnPath.length < 2) return;
  ctx.save(); ctx.setLineDash([5, 10]); ctx.lineDashOffset = -Date.now() / 30;
  for (let i = 1; i < ball.returnPath.length; i++) {
    const pg = i / ball.returnPath.length;
    if (pg < ball.returnT - .02) continue;
    const r0 = ball.returnPath[i-1], r1 = ball.returnPath[i];
    ctx.beginPath(); ctx.moveTo(r0.x, r0.y); ctx.lineTo(r1.x, r1.y);
    ctx.strokeStyle = `rgba(180,200,240,${pg * .4})`;
    ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();
}

// ─── HEDEF ÇİZ ──────────────────────────────────────────────
function drawTarget(t) {
  if (t.broken) {
    for (const s of t.shards) {
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot); ctx.globalAlpha = s.life;
      ctx.beginPath(); ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(160,170,200,.85)'; ctx.fill(); ctx.restore();
    }
    return;
  }
  const { x, y, r, flash } = t;
  ctx.save();
  if (flash > 0) { ctx.shadowColor = 'rgba(180,220,255,.9)'; ctx.shadowBlur = 20 * flash; }

  // Demir levha görünümü
  const mg = ctx.createRadialGradient(x - r * .2, y - r * .2, 0, x, y, r);
  mg.addColorStop(0, '#8a9aaa'); mg.addColorStop(.5, '#5a6a78'); mg.addColorStop(1, '#2a3840');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = mg; ctx.fill(); ctx.strokeStyle = '#1a2830'; ctx.lineWidth = 2; ctx.stroke();

  // Hedef çemberleri
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath(); ctx.arc(x, y, r * i / 3.5, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${.15 - i * .03})`; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Çarpı işareti
  ctx.strokeStyle = 'rgba(255,100,80,.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x - r * .3, y - r * .3); ctx.lineTo(x + r * .3, y + r * .3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + r * .3, y - r * .3); ctx.lineTo(x - r * .3, y + r * .3); ctx.stroke();

  // Parlama
  ctx.beginPath(); ctx.ellipse(x - r * .25, y - r * .28, r * .2, r * .1, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.fill();
  ctx.restore();
}

// ─── EL ÇİZ ─────────────────────────────────────────────────
function drawHand(ls) {
  if (!ls) return;
  const fingers = [[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
  const lmPt = i => ({ x: ls[i].x * W, y: ls[i].y * H });
  const palmPts = [0,1,5,9,13,17].map(lmPt);
  ctx.beginPath(); ctx.moveTo(palmPts[0].x, palmPts[0].y);
  for (const p of palmPts) ctx.lineTo(p.x, p.y); ctx.closePath();
  ctx.fillStyle = 'rgba(255,200,150,.18)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,200,150,.35)'; ctx.lineWidth = 2; ctx.stroke();
  for (const f of fingers) {
    ctx.beginPath();
    for (let i = 0; i < f.length; i++) { const p = lmPt(f[i]); i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); }
    ctx.strokeStyle = 'rgba(255,200,150,.6)'; ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.stroke();
  }
  for (let i = 0; i < ls.length; i++) {
    const p = lmPt(i); ctx.beginPath(); ctx.arc(p.x, p.y, i === 0 ? 6 : 3, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? 'rgba(255,140,70,.9)' : 'rgba(255,215,170,.8)'; ctx.fill();
  }
}

// ─── SAHNE ──────────────────────────────────────────────────
function drawScene() {
  ctx.clearRect(0, 0, W, H);
  // Koyu arka plan
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080614'); bg.addColorStop(.5, '#0c0e20'); bg.addColorStop(1, '#0a0c18');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Zemin
  const gr = ctx.createLinearGradient(0, H * .78, 0, H);
  gr.addColorStop(0, '#151208'); gr.addColorStop(1, '#080604');
  ctx.fillStyle = gr; ctx.fillRect(0, H * .78, W, H * .22);
  ctx.beginPath(); ctx.moveTo(0, H * .78); ctx.lineTo(W, H * .78);
  ctx.strokeStyle = 'rgba(80,60,30,.4)'; ctx.lineWidth = 1; ctx.stroke();

  // Yıldızlar
  for (let i = 0; i < 60; i++) {
    const sx = (Math.sin(i * 137.5) * .5 + .5) * W;
    const sy = (Math.cos(i * 97.3) * .5 + .5) * H * .72;
    const br = .2 + Math.sin(Date.now() / 900 + i) * .15;
    ctx.beginPath(); ctx.arc(sx, sy, .4 + Math.sin(Date.now() / 1100 + i) * .3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${br})`; ctx.fill();
  }

  // Flash
  if (sflash > 0) {
    ctx.fillStyle = `rgba(180,210,255,${sflash / 80})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── GÜNCELLE ───────────────────────────────────────────────
function update() {
  if (handLms) {
    const center = getHandCenter(handLms);
    const handSize = getHandSize(handLms);
    const op = getOpenness(handLms);
    const isOpen = op > .7, isFist = op < .3;

    ball.prevHX = ball.handX; ball.prevHY = ball.handY;
    ball.handX = center.x; ball.handY = center.y;
    ball.handR = handSize;

    // Frame sayaçları
    if (isFist) ball.fframes = Math.min(ball.fframes + 1, 40);
    else ball.fframes = Math.max(ball.fframes - 2, 0);
    if (isOpen) ball.oframes = Math.min(ball.oframes + 1, 40);
    else ball.oframes = Math.max(ball.oframes - 2, 0);

    // El açık → top ele gel
    if (isOpen && (ball.state === 'fly' || ball.state === 'idle')) {
      if (ball.oframes > 12) recallBall();
    }

    // Elde → top ele yapış
    if (ball.state === 'hand') {
      ball.x += (center.x - ball.x) * .3;
      ball.y += (center.y - ball.y) * .3;
      ball.targetR = handSize; // El boyutuyla eşleş
      // Yumruk → aç = fırlat
      if (isFist) ball.prevFist = true;
      if (ball.prevFist && isOpen && ball.fframes > 5) {
        throwBall();
        ball.prevFist = false;
      }
    }

    // Geri dönüş bitince elde
    if (ball.state === 'returning') {
      ball.targetR = handSize; // Dönüş sırasında boyut yaklaş
    }
  } else {
    ball.prevFist = false;
    ball.oframes = 0; ball.fframes = 0;
  }

  // Boyutu smooth değiştir
  ball.r += (ball.targetR - ball.r) * .12;

  // Uçuş
  if (ball.state === 'fly') {
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 20) ball.trail.shift();
    ball.vy += .55; // yerçekimi
    ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= .99;

    // Duvara çarp
    if (ball.x < ball.r) { ball.x = ball.r; ball.vx *= -.6; }
    if (ball.x > W - ball.r) { ball.x = W - ball.r; ball.vx *= -.6; }

    // Yere düştü
    if (ball.y > H + ball.r * 2) {
      ball.state = 'idle';
      ball.x = W / 2; ball.y = H * .5;
      ball.trail = [];
    }

    // Hedefe çarp
    for (const t of targets) {
      if (t.broken) continue;
      if (Math.hypot(ball.x - t.x, ball.y - t.y) < ball.r + t.r) {
        hitTarget(t);
        break;
      }
    }
  }

  // Geri dönüş
  if (ball.state === 'returning') {
    ball.returnT = Math.min(1, ball.returnT + .018);
    // Son noktayı güncel el konumuna çek
    if (ball.returnPath.length > 0) {
      const last = ball.returnPath[ball.returnPath.length - 1];
      last.x += (ball.handX - last.x) * .15;
      last.y += (ball.handY - last.y) * .15;
    }
    const idx = Math.floor(ball.returnT * (ball.returnPath.length - 1));
    const pt = ball.returnPath[Math.min(idx, ball.returnPath.length - 1)];
    ball.x = pt.x; ball.y = pt.y;
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 16) ball.trail.shift();
    if (ball.returnT >= 1) {
      ball.state = 'hand';
      ball.trail = [];
    }
  }

  // Idle: ortada yüzer
  if (ball.state === 'idle') {
    ball.x += (W / 2 - ball.x) * .02;
    ball.y += (H * .45 - ball.y) * .02;
    ball.targetR = 50;
  }

  // Parçacıklar
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx; p.y += p.vy; p.vy += .2; p.life -= p.dc;
    if (p.life <= 0) parts.splice(i, 1);
  }

  // Hedefler
  for (const t of targets) {
    if (t.broken) {
      for (const s of t.shards) { s.x += s.vx; s.y += s.vy; s.vy += .25; s.rot += s.vr; s.life -= .013; }
      t.respawn--;
      if (t.respawn <= 0) { const i = targets.indexOf(t); targets[i] = mkTarget(); }
    } else { if (t.flash > 0) t.flash -= .04; }
  }
  if (sflash > 0) sflash--;
}

// ─── ÇİZ ────────────────────────────────────────────────────
function draw() {
  drawScene();
  for (const t of targets) drawTarget(t);
  for (const p of parts) {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.col + p.life + ')'; ctx.fill();
  }
  drawReturnPath();
  drawTrail();
  // Top: state'e göre alpha
  const alpha = ball.state === 'idle' ? .7 : 1;
  drawBall(ball.x, ball.y, ball.r, alpha);
  drawHand(handLms);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

// ─── MEDIAPIPE ──────────────────────────────────────────────
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: .6, minTrackingConfidence: .5 });
hands.onResults(r => {
  loadDiv.style.display = 'none';
  handLms = (r.multiHandLandmarks && r.multiHandLandmarks.length > 0) ? r.multiHandLandmarks[0] : null;
});

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
      vid.play();
      new Camera(vid, { onFrame: async () => { await hands.send({ image: vid }); }, width: 1280, height: 720 }).start();
    };
  } catch (e) {
    document.getElementById('lp').textContent = 'Kamera izni gerekli: ' + e.message;
    document.querySelector('.sp').style.display = 'none';
  }
}
startCamera();
</script>
</body>
</html>
